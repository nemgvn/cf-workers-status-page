# wrangler.toml
name = "status"
account_id = "nthe0241@gmail.com"     # ← Điền Account ID của bạn
workers_dev = true

type = "webpack"
webpack_config = "node_modules/flareact/webpack"
compatibility_date = "2023-09-28"

[site]
bucket = "out"
entry-point = "./"

[triggers]
crons = ["*/5 * * * *"]                       # ← Cron chạy mỗi 5 phút (nên dùng thay vì mỗi phút)

[env.production]
kv-namespaces = [
  { binding = "KV_STATUS_PAGE", id = "YOUR_KV_NAMESPACE_ID", preview_id = "YOUR_KV_PREVIEW_ID" }
]

# (Không bắt buộc) Gán domain riêng cho Worker nếu bạn có:
# zone_id = "YOUR_ZONE_ID"
# route = "status.yourdomain.com/*"
